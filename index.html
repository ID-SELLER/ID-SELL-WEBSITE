<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Store</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

/* HEADER */
header{
  background:#020617;
  padding:20px;
  font-size:24px;
  color:cyan;
}

/* CARDS */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}

.card{
  background:#111827;
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:220px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  border-radius:8px;
}

.price{
  color:lime;
  font-weight:bold;
}

/* BUTTONS */
.btn{
  display:inline-block;
  background:cyan;
  color:black;
  padding:8px 15px;
  border-radius:5px;
  text-decoration:none;
  margin-top:8px;
}
  .btn {
  background: linear-gradient(45deg, #ff00cc, #3333ff);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff00cc;
}

.btn:hover {
  background: linear-gradient(45deg, #ff0080, #6600ff);
  transform: scale(1.05);
  .divider-text{
  text-align:center;
  margin:20px;
  color:cyan;
  position:relative;
}
}

.viewBtn{
  display:inline-block;
  margin-top:5px;
  padding:6px 12px;
  background:orange;
  border:none;
  border-radius:5px;
  cursor:pointer;
  text-decoration: none;
}

/* FOOTER */
footer{
  margin-top:20px;
  padding:10px;
  background:#020617;
}

/* WHATSAPP FLOAT */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px;
  border-radius:50%;
  font-size:20px;
}

/* GALLERY */
#gallery{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  overflow:auto;
  padding:20px;
  z-index:9999;
}

#gallery img{
  width:90%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

.close{
  position:absolute;
  top:10px;
  right:20px;
  font-size:30px;
  color:white;
  cursor:pointer;
}
.buy-btn {
  background: linear-gradient(45deg, #ff00cc, #3333ff);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff00cc;
}

.buy-btn:hover {
  background: linear-gradient(45deg, #ff0080, #6600ff);
  transform: scale(1.05);
  .divider-text{
  text-align:center;
  margin:20px;
  color:cyan;
  position:relative;
}

#divider-text::before,
#divider-text::after{
  content:"";
  position:absolute;
  top:50%;
  width:40%;
  height:1px;
  background:cyan;
}

#divider-text::before{
  left:0;
}

.#divider-text::after{
  right:0;
}
}

#imgViewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#imgViewer img{
  width:90%;
  max-width:400px;
  border-radius:10px;
}

#imgViewer span{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:25px;
  cursor:pointer;
} 
.logo-img{
  box-shadow:0 0 8px cyan;
}
.logo-img:hover{
  transform:scale(1.1);
  transition:0.3s;
}
</style>
</head>
<div id="imgViewer">
  <span onclick="closeImg()">X</span>
  <img id="fullImg">
</div>
<body>

<script>
function openGallery(){
  document.getElementById("gallery").style.display = "block";
}

function closeGallery(){
  document.getElementById("gallery").style.display = "none";
}
function openImg(img){

function closeImg(){

</body>
</html>
