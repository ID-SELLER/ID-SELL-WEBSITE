<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <title>VIEW ID</title>
<style>
        body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color:white;
  text-align:center;
}

/* Heading */
h1{
  padding:15px;
  color:cyan;
  text-shadow:0 0 10px cyan;
}

/* IMAGE */
.id-img{
  width:90%;
  max-width:400px;
  margin-top:20px;
  border-radius:15px;
  box-shadow:0 0 20px cyan;
}

/* HOVER EFFECT */
.id-img:hover{
  transform:scale(1.05);
  transition:0.3s;
}a{
  display:inline-block;
  margin-top:20px;
  color:black;
  background:cyan;
  padding:10px 15px;
  border-radius:5px;
  text-decoration:none;
}
</style>
</head>

<body>
